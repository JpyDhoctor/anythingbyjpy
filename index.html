  <title>AnythingbyJpy | Premier Artisan Network</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #0a0c10;
      --surface: #13171f;
      --surface-elevated: #1a202a;
      --gold: #f5c542;
      --gold-glow: rgba(245, 197, 66, 0.25);
      --text-light: #f0f3f8;
      --text-muted: #9aa4bf;
      --border-dim: rgba(245, 197, 66, 0.2);
      --gradient-1: linear-gradient(135deg, #f5c542 0%, #d9a520 100%);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      line-height: 1.5;
      scroll-behavior: smooth;
    }

    /* Glassmorphic nav */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(10, 12, 16, 0.85);
      backdrop-filter: blur(16px);
      z-index: 1100;
      border-bottom: 1px solid var(--border-dim);
      transition: all 0.25s ease;
    }

    .nav-container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0.9rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      width: 48px;
      height: 48px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.4rem;
      color: #0a0c10;
      transition: 0.2s;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .nav-link {
      color: var(--text-light);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: 0.2s;
      position: relative;
    }

    .nav-link:hover, .nav-link.active {
      color: var(--gold);
    }

    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 1.8rem;
      cursor: pointer;
    }

    /* hero */
    .hero {
      padding: 8rem 2rem 6rem;
      text-align: center;
      background: radial-gradient(circle at 70% 20%, rgba(245,197,66,0.08), transparent 70%);
    }

    .hero h1 {
      font-size: 3.6rem;
      font-weight: 800;
      background: linear-gradient(to right, #fff, var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      max-width: 900px;
      margin: 0 auto 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.8rem 2rem;
      border-radius: 40px;
      font-weight: 600;
      text-decoration: none;
      transition: 0.2s;
    }
